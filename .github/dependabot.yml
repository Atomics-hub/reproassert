version: 2
updates:
  - package-ecosystem: pip
    directory: /
    schedule:
      interval: weekly
      day: monday
      time: "09:00"
      timezone: America/Los_Angeles
    open-pull-requests-limit: 5
    commit-message:
      prefix: deps

  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
      day: monday
      time: "09:30"
      timezone: America/Los_Angeles
    open-pull-requests-limit: 5
    commit-message:
      prefix: ci

  - package-ecosystem: npm
    directory: /site
    schedule:
      interval: weekly
      day: monday
      time: "10:00"
      timezone: America/Los_Angeles
    open-pull-requests-limit: 5
    commit-message:
      prefix: site-deps

  - package-ecosystem: docker
    directory: /src/reproassert/assets
    schedule:
      interval: weekly
      day: monday
      time: "10:30"
      timezone: America/Los_Angeles
    open-pull-requests-limit: 3
    commit-message:
      prefix: sandbox-deps
