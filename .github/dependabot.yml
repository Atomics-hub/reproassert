version: 2
updates:
  - package-ecosystem: pip
    directory: /
    schedule:
      interval: monthly
      time: "09:00"
      timezone: America/Los_Angeles
    open-pull-requests-limit: 1
    groups:
      python-dependencies:
        patterns: ["*"]
        update-types: [minor, patch]
    ignore:
      - dependency-name: "*"
        update-types: ["version-update:semver-major"]
    commit-message:
      prefix: deps

  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: monthly
      time: "09:30"
      timezone: America/Los_Angeles
    open-pull-requests-limit: 1
    groups:
      actions:
        patterns: ["*"]
    commit-message:
      prefix: ci

  - package-ecosystem: npm
    directory: /site
    schedule:
      interval: monthly
      time: "10:00"
      timezone: America/Los_Angeles
    open-pull-requests-limit: 1
    groups:
      site-dependencies:
        patterns: ["*"]
        update-types: [minor, patch]
    ignore:
      - dependency-name: "*"
        update-types: ["version-update:semver-major"]
      - dependency-name: vinext
        update-types:
          - "version-update:semver-major"
          - "version-update:semver-minor"
    commit-message:
      prefix: site-deps

  - package-ecosystem: docker
    directory: /src/reproassert/assets
    schedule:
      interval: monthly
      time: "10:30"
      timezone: America/Los_Angeles
    open-pull-requests-limit: 1
    ignore:
      - dependency-name: python
        versions: [">=3.13"]
    commit-message:
      prefix: sandbox-deps
