name: Release

on:
  push:
    tags:
      - "v*.*.*"

permissions: {}

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

env:
  PYTHONDONTWRITEBYTECODE: "1"

jobs:
  verify:
    name: Verify tagged source
    runs-on: ubuntu-24.04
    timeout-minutes: 30
    permissions:
      contents: read
    steps:
      - name: Check out tagged source
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0
          persist-credentials: false
      - name: Require the tagged commit to be on main
        run: |
          git merge-base --is-ancestor "$GITHUB_SHA" refs/remotes/origin/main || {
            echo "Refusing to release a tag whose commit is not on main." >&2
            exit 1
          }
      - name: Set up Python
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6.3.0
        with:
          python-version: "3.14"
      - name: Set up hash-locked uv
        uses: astral-sh/setup-uv@11f9893b081a58869d3b5fccaea48c9e9e46f990 # v8.3.2
        with:
          version: "0.11.28"
          enable-cache: false
      - name: Match tag, project metadata, and controller version
        run: |
          python - <<'PY'
          import ast
          import os
          import re
          import tomllib
          from pathlib import Path

          tag = os.environ["GITHUB_REF_NAME"]
          if re.fullmatch(r"v[0-9]+\.[0-9]+\.[0-9]+", tag) is None:
              raise SystemExit(f"release tag is not an exact stable version: {tag}")
          project_version = tomllib.loads(Path("pyproject.toml").read_text())["project"]["version"]
          tree = ast.parse(Path("src/reproassert/__init__.py").read_text())
          source_version = None
          for node in tree.body:
              if isinstance(node, ast.Assign) and any(
                  isinstance(target, ast.Name) and target.id == "__version__"
                  for target in node.targets
              ):
                  source_version = ast.literal_eval(node.value)
          if project_version != source_version or tag != f"v{project_version}":
              raise SystemExit(
                  f"version mismatch: {tag=} {project_version=} {source_version=}"
              )
          PY
      - name: Install only locked Python dependencies
        run: uv sync --frozen --all-extras --python 3.14
      - name: Run Python release checks
        run: |
          uv run --frozen --no-sync ruff check .
          uv run --frozen --no-sync ruff format --check .
          uv run --frozen --no-sync mypy src
          uv run --frozen --no-sync python scripts/validate_benchmark.py
          uv run --frozen --no-sync python -m pytest --cov=reproassert --cov-report=term-missing
      - name: Build and verify the sandbox boundary
        run: |
          uv run --frozen --no-sync reproassert sandbox build
          uv run --frozen --no-sync reproassert doctor
          REPROASSERT_RUN_DOCKER_TESTS=1 uv run --frozen --no-sync python -m pytest -m integration
      - name: Set up Node.js
        uses: actions/setup-node@395ad3262231945c25e8478fd5baf05154b1d79f # v6.1.0
        with:
          node-version: "22.19.0"
          package-manager-cache: false
      - name: Verify the public site from its lockfile
        working-directory: site
        run: |
          npm ci
          npm test
          npm run lint

  build:
    name: Build locked distributions
    needs: verify
    runs-on: ubuntu-24.04
    timeout-minutes: 15
    permissions:
      contents: read
    steps:
      - name: Check out tagged source
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - name: Set up Python
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6.3.0
        with:
          python-version: "3.14"
      - name: Set up hash-locked uv
        uses: astral-sh/setup-uv@11f9893b081a58869d3b5fccaea48c9e9e46f990 # v8.3.2
        with:
          version: "0.11.28"
          enable-cache: false
      - name: Install locked build tools without the project
        run: uv sync --frozen --all-extras --no-install-project --python 3.14
      - name: Build without an isolated live dependency resolution
        run: |
          uv build --no-build-isolation
          python - <<'PY'
          from pathlib import Path

          wheels = list(Path("dist").glob("*.whl"))
          sdists = list(Path("dist").glob("*.tar.gz"))
          files = [path for path in Path("dist").iterdir() if path.is_file()]
          if len(wheels) != 1 or len(sdists) != 1 or len(files) != 2:
              raise SystemExit(
                  f"expected one wheel and one sdist only, got {wheels=} {sdists=} {files=}"
              )
          PY
          cd dist
          sha256sum --binary *.whl *.tar.gz > SHA256SUMS
      - name: Verify the built wheel reports the tag version
        run: |
          uv venv "$RUNNER_TEMP/wheel-version" --python 3.14
          uv pip install --python "$RUNNER_TEMP/wheel-version/bin/python" --no-deps dist/*.whl
          "$RUNNER_TEMP/wheel-version/bin/reproassert" --version
          "$RUNNER_TEMP/wheel-version/bin/reproassert" --help >/dev/null
          "$RUNNER_TEMP/wheel-version/bin/reproassert" schema >/dev/null
          "$RUNNER_TEMP/wheel-version/bin/python" - <<'PY'
          import json
          import os
          from importlib import resources

          import reproassert

          expected = os.environ["GITHUB_REF_NAME"].removeprefix("v")
          if reproassert.__version__ != expected:
              raise SystemExit(
                  f"wheel/controller version mismatch: {reproassert.__version__=} {expected=}"
              )
          schema_path = (
              resources.files("reproassert")
              .joinpath("schemas")
              .joinpath("reproassert-report.schema.json")
          )
          schema = json.loads(schema_path.read_text(encoding="utf-8"))
          if schema.get("$id") != (
              "https://atomics-hub.github.io/reproassert/reproassert-report.schema.json"
          ):
              raise SystemExit("release wheel contains an unexpected report schema")
          assets = resources.files("reproassert").joinpath("assets")
          for name in ("Dockerfile", "requirements.lock"):
              if not assets.joinpath(name).is_file():
                  raise SystemExit(f"release wheel is missing sandbox asset: {name}")
          PY
      - name: Preserve distributions for attestation and publication
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: release-distributions
          path: dist/
          if-no-files-found: error
          retention-days: 7

  attest:
    name: Attest verified distributions
    needs: build
    runs-on: ubuntu-24.04
    timeout-minutes: 10
    permissions:
      artifact-metadata: write
      attestations: write
      contents: read
      id-token: write
    steps:
      - name: Download distributions without executing repository code
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: release-distributions
          path: dist
      - name: Verify distribution checksums
        run: |
          cd dist
          sha256sum --check SHA256SUMS
      - name: Attest distribution provenance
        uses: actions/attest@a1948c3f048ba23858d222213b7c278aabede763 # v4.1.1
        with:
          subject-path: |
            dist/*.whl
            dist/*.tar.gz
          show-summary: true

  publish:
    name: Publish GitHub release
    needs: attest
    runs-on: ubuntu-24.04
    timeout-minutes: 10
    permissions:
      contents: write
    steps:
      - name: Require the remote tag to still resolve to the initiating commit
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          ref_json="$(gh api "repos/$GITHUB_REPOSITORY/git/ref/tags/$GITHUB_REF_NAME")"
          object_type="$(jq -r '.object.type' <<<"$ref_json")"
          object_sha="$(jq -r '.object.sha' <<<"$ref_json")"
          for _ in 1 2 3 4 5; do
            if test "$object_type" = commit; then
              break
            fi
            if test "$object_type" != tag; then
              echo "Refusing release: tag points to unsupported object type $object_type." >&2
              exit 1
            fi
            tag_json="$(gh api "repos/$GITHUB_REPOSITORY/git/tags/$object_sha")"
            object_type="$(jq -r '.object.type' <<<"$tag_json")"
            object_sha="$(jq -r '.object.sha' <<<"$tag_json")"
          done
          if test "$object_type" != commit || test "$object_sha" != "$GITHUB_SHA"; then
            echo "Refusing release: remote tag no longer resolves to initiating SHA." >&2
            exit 1
          fi
      - name: Download attested distributions
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: release-distributions
          path: dist
      - name: Verify downloaded release assets
        run: |
          cd dist
          test "$(find . -maxdepth 1 -type f | wc -l)" -eq 3
          test "$(find . -maxdepth 1 -type f -name '*.whl' | wc -l)" -eq 1
          test "$(find . -maxdepth 1 -type f -name '*.tar.gz' | wc -l)" -eq 1
          test -f SHA256SUMS
          sha256sum --check SHA256SUMS
      - name: Create immutable-by-policy GitHub release assets
        env:
          GH_TOKEN: ${{ github.token }}
          RELEASE_NOTES: |
            ReproAssert 0.1.0 is a public alpha source release for the bounded Python/pytest workflow.

            Verified scope: canonical public GitHub issue intake at an exact SHA, one policy-screened
            pytest candidate, hardened Docker collection and repeated base-failure checks, a test-only
            patch, schema-1.0 JSON report, and bounded replay. The checked-in self-owned fixture reaches
            the same intended AssertionError fingerprint in 3/3 forward and 3/3 replay runs.

            Claim limits: the frozen historical benchmark remains 0/20 scored, no outside maintainer
            has validated a candidate or committed to reuse, failed generation-attempt cost is not yet
            captured, and no accuracy, demand, revenue, or hosted-readiness claim is made. The built-in
            OpenAI adapter is opt-in and was contract-tested without a live paid request. This release is
            not published to PyPI.
        run: >-
          gh release create "$GITHUB_REF_NAME"
          dist/*
          --repo "$GITHUB_REPOSITORY"
          --title "ReproAssert $GITHUB_REF_NAME"
          --notes "$RELEASE_NOTES"
          --generate-notes
          --verify-tag
