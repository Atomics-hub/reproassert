name: CI

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  PIP_DISABLE_PIP_VERSION_CHECK: "1"
  PIP_NO_INPUT: "1"
  PYTHONDONTWRITEBYTECODE: "1"

jobs:
  quality:
    name: Quality and benchmark contract
    runs-on: ubuntu-24.04
    timeout-minutes: 10
    steps:
      - name: Check out source
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - name: Set up Python
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6.3.0
        with:
          python-version: "3.14"
          cache: pip
          cache-dependency-path: pyproject.toml
      - name: Install development tools
        run: python -m pip install --editable '.[dev]'
      - name: Lint
        run: python -m ruff check .
      - name: Check formatting
        run: python -m ruff format --check .
      - name: Type-check
        run: python -m mypy src
      - name: Validate frozen benchmark metadata
        run: python scripts/validate_benchmark.py

  unit:
    name: Unit and wheel smoke (Python ${{ matrix.python-version }})
    runs-on: ubuntu-24.04
    timeout-minutes: 15
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12", "3.13", "3.14"]
    steps:
      - name: Check out source
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - name: Set up Python
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6.3.0
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip
          cache-dependency-path: pyproject.toml
      - name: Install package and test tools
        run: python -m pip install --editable '.[dev]'
      - name: Run unit tests with branch coverage
        run: >-
          python -m pytest
          --cov=reproassert
          --cov-report=term-missing
          --cov-report=xml
      - name: Build and install a wheel on this Python version
        run: |
          python -m build --wheel --outdir "$RUNNER_TEMP/dist"
          python -m venv "$RUNNER_TEMP/wheel-smoke"
          "$RUNNER_TEMP/wheel-smoke/bin/python" -m pip install "$RUNNER_TEMP"/dist/*.whl
          "$RUNNER_TEMP/wheel-smoke/bin/reproassert" --version
          "$RUNNER_TEMP/wheel-smoke/bin/reproassert" --help >/dev/null

  package:
    name: Build and install distributions
    runs-on: ubuntu-24.04
    timeout-minutes: 10
    steps:
      - name: Check out source
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - name: Set up Python
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6.3.0
        with:
          python-version: "3.14"
          cache: pip
          cache-dependency-path: pyproject.toml
      - name: Install build frontend
        run: python -m pip install 'build>=1.2,<2'
      - name: Build wheel and source distribution
        run: python -m build
      - name: Require one wheel and one source distribution
        run: |
          python - <<'PY'
          from pathlib import Path

          wheels = list(Path("dist").glob("*.whl"))
          sdists = list(Path("dist").glob("*.tar.gz"))
          if len(wheels) != 1 or len(sdists) != 1:
              raise SystemExit(f"expected one wheel and one sdist, got {wheels=} {sdists=}")
          PY
      - name: Install wheel in a clean environment
        run: |
          python -m venv "$RUNNER_TEMP/reproassert-smoke"
          "$RUNNER_TEMP/reproassert-smoke/bin/python" -m pip install dist/*.whl
          "$RUNNER_TEMP/reproassert-smoke/bin/reproassert" --version
          "$RUNNER_TEMP/reproassert-smoke/bin/reproassert" --help
          "$RUNNER_TEMP/reproassert-smoke/bin/reproassert" schema >/dev/null
          "$RUNNER_TEMP/reproassert-smoke/bin/python" - <<'PY'
          import json
          from importlib import resources

          assets = resources.files("reproassert").joinpath("assets")
          for name in ("Dockerfile", "requirements.lock"):
              if not assets.joinpath(name).is_file():
                  raise SystemExit(f"wheel is missing embedded sandbox asset: {name}")
          schema_path = (
              resources.files("reproassert")
              .joinpath("schemas")
              .joinpath("reproassert-report.schema.json")
          )
          if not schema_path.is_file():
              raise SystemExit("wheel is missing the report schema")
          schema = json.loads(schema_path.read_text(encoding="utf-8"))
          if schema.get("$id") != (
              "https://atomics-hub.github.io/reproassert/reproassert-report.schema.json"
          ):
              raise SystemExit("wheel contains an unexpected report schema")
          PY
      - name: Install source distribution and run its shipped unit tests
        run: |
          python -m venv "$RUNNER_TEMP/reproassert-sdist-smoke"
          "$RUNNER_TEMP/reproassert-sdist-smoke/bin/python" -m pip install \
            dist/*.tar.gz \
            'jsonschema>=4.23,<5' \
            'pytest>=9.0,<10' \
            'pytest-cov>=6.0,<8'
          "$RUNNER_TEMP/reproassert-sdist-smoke/bin/reproassert" --version
          "$RUNNER_TEMP/reproassert-sdist-smoke/bin/reproassert" schema >/dev/null
          mkdir -p "$RUNNER_TEMP/reproassert-sdist-source"
          tar -xzf dist/*.tar.gz -C "$RUNNER_TEMP/reproassert-sdist-source"
          sdist_root="$(find "$RUNNER_TEMP/reproassert-sdist-source" \
            -mindepth 1 -maxdepth 1 -type d -print -quit)"
          test -n "$sdist_root"
          cd "$sdist_root"
          "$RUNNER_TEMP/reproassert-sdist-smoke/bin/python" -m pytest -m 'not integration'
      - name: Upload distributions
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: python-distributions
          path: dist/
          if-no-files-found: error
          retention-days: 7

  site:
    name: Site build, rendered contract, and lint
    runs-on: ubuntu-24.04
    timeout-minutes: 15
    steps:
      - name: Check out source
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - name: Set up Node.js
        uses: actions/setup-node@395ad3262231945c25e8478fd5baf05154b1d79f # v6.1.0
        with:
          node-version: "22.19.0"
          cache: npm
          cache-dependency-path: site/package-lock.json
      - name: Install the locked site dependencies
        working-directory: site
        run: npm ci
      - name: Build and verify rendered HTML
        working-directory: site
        run: npm test
      - name: Lint the site
        working-directory: site
        run: npm run lint

  docker-sandbox:
    name: Docker sandbox boundary
    runs-on: ubuntu-24.04
    timeout-minutes: 20
    permissions:
      contents: read
    steps:
      - name: Check out source without persisting credentials
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - name: Set up Python
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6.3.0
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: pyproject.toml
      - name: Install package and test tools
        run: python -m pip install --editable '.[dev]'
      - name: Build the embedded sandbox image
        run: reproassert sandbox build
      - name: Confirm the sandbox is ready
        run: reproassert doctor
      - name: Run the required Docker integration fixtures
        run: REPROASSERT_RUN_DOCKER_TESTS=1 python -m pytest -m integration
